<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreightBid — Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            background: var(--bg);
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 48px 48px;
            opacity: 0.3;
            pointer-events: none;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.4s ease;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo h1 {
            font-family: var(--font-cond);
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .auth-logo h1 span {
            color: var(--accent);
        }

        .auth-logo p {
            color: var(--muted);
            font-size: 0.85rem;
            font-family: var(--font-mono);
            margin-top: 4px;
        }

        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
        }

        .tabs {
            display: flex;
            background: var(--bg);
            border-radius: var(--radius);
            padding: 4px;
            margin-bottom: 28px;
        }

        .tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            border-radius: 6px;
            font-family: var(--font-cond);
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--surface2);
            color: var(--text);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .role-select {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }

        .role-option {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .role-option:hover {
            border-color: var(--accent);
        }

        .role-option.selected {
            border-color: var(--accent);
            background: rgba(245, 158, 11, 0.1);
        }

        .role-icon {
            font-size: 1.8rem;
            margin-bottom: 4px;
        }

        .role-name {
            font-family: var(--font-cond);
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .role-desc {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 2px;
        }

        #error-msg {
            display: none;
            margin-bottom: 16px;
        }


    </style>
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-logo">
            <h1>Freight<span>Bid</span></h1>
            <p>Intelligence-driven logistics platform</p>
        </div>

        <div class="auth-card">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('login')">Login</div>
                <div class="tab" onclick="switchTab('register')">Register</div>
            </div>

            <div id="error-msg" class="alert alert-error"></div>

            <!-- LOGIN FORM -->
            <div id="form-login" class="auth-form active">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="you@company.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <button class="btn btn-primary btn-full" onclick="doLogin()">
                    → Login
                </button>

                <p style="text-align:center; margin-top:16px; font-size:0.82rem; color:var(--muted);">
                    No account? <a href="#" onclick="switchTab('register')" style="color:var(--accent);">Register
                        here</a>
                </p>
            </div>

            <!-- REGISTER FORM -->
            <div id="form-register" class="auth-form">
                <p style="font-size:0.82rem; color:var(--muted); margin-bottom:16px;">
                    I am a...
                </p>

                <div class="role-select">
                    <div class="role-option selected" id="role-shipper" onclick="selectRole('shipper')">
                        <div class="role-icon">🏭</div>
                        <div class="role-name">Shipper</div>
                        <div class="role-desc">I have goods to transport</div>
                    </div>
                    <div class="role-option" id="role-driver" onclick="selectRole('driver')">
                        <div class="role-icon">🚛</div>
                        <div class="role-name">Driver</div>
                        <div class="role-desc">I have a truck, I bid on loads</div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" placeholder="Ravi Kumar">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="you@company.com">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="reg-phone" placeholder="+91 9876543210">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="••••••••">
                </div>



                <button class="btn btn-primary btn-full" onclick="doRegister()">
                    → Create Account
                </button>
            </div>
        </div>
    </div>

    <script src="/js/api.js?v=10"></script>
    <script>
        // Redirect if already logged in — always go to dashboard, never back to KYC
        if (isLoggedIn()) {
            redirectByRole(getRole(), getKycStatus(), false);
        }

        let selectedRole = "shipper";

        function selectRole(role) {
            selectedRole = role;
            if (role === "shipper") {
                document.getElementById("role-shipper").classList.add("selected");
                document.getElementById("role-driver").classList.remove("selected");
            } else {
                document.getElementById("role-shipper").classList.remove("selected");
                document.getElementById("role-driver").classList.add("selected");
            }
        }

        function switchTab(tab) {
            document.querySelectorAll(".tab").forEach((t, i) => {
                t.classList.toggle("active",
                    (i === 0 && tab === "login") || (i === 1 && tab === "register"));
            });
            document.getElementById("form-login").classList.toggle("active", tab === "login");
            document.getElementById("form-register").classList.toggle("active", tab === "register");
            hideError();
        }

        function showError(msg) {
            const el = document.getElementById("error-msg");
            el.textContent = msg;
            el.style.display = "block";
        }

        function hideError() {
            document.getElementById("error-msg").style.display = "none";
        }

        function redirectByRole(role, kycStatus, isNewRegistration) {
            if (kycStatus !== "verified") {
                window.location.href = "/pages/kyc.html";
            } else {
                if (role === "shipper") {
                    window.location.href = "/pages/shipper.html";
                } else if (role === "driver") {
                    window.location.href = "/pages/driver.html";
                } else {
                    window.location.href = "/";
                }
            }
        }

        async function doLogin() {
            hideError();
            const email = document.getElementById("login-email").value.trim();
            const password = document.getElementById("login-password").value;

            if (!email || !password) {
                showError("Please fill in all fields");
                return;
            }

            try {
                const data = await login(email, password);
                redirectByRole(data.role, data.kyc_status, false); // login → always dashboard
            } catch (err) {
                showError(err.message);
            }
        }

        async function doRegister() {
            hideError();
            const name = document.getElementById("reg-name").value.trim();
            const email = document.getElementById("reg-email").value.trim();
            const phone = document.getElementById("reg-phone").value.trim();
            const password = document.getElementById("reg-password").value;

            if (!name || !email || !password) {
                showError("Name, email and password are required");
                return;
            }

            try {
                const data = await register(name, email, password, selectedRole, phone);
                redirectByRole(data.role, data.kyc_status, true); // registration → KYC for new drivers
            } catch (err) {
                showError(err.message);
            }
        }

        // Allow pressing Enter to submit
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const loginActive = document.getElementById("form-login").classList.contains("active");
                if (loginActive) doLogin(); else doRegister();
            }
        });
    </script>
</body>

</html>
